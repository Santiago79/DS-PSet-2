services:
  db:
    image: postgres:15-alpine
    container_name: fintech_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-ui:
    image: dpage/pgadmin4
    container_name: fintech_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@localhost.com
      - PGADMIN_DEFAULT_PASSWORD=root
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fintech_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fintech_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintech_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - fintech_network

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: fintech_ui
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    networks:
      - fintech_network

networks:
  fintech_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: